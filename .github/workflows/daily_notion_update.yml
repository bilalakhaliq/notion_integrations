name: Daily Notion Update

on:
  schedule:
    - cron: "33 20 * * *"
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: false
        default: 'info'

permissions:
  contents: write

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run Notion update script
        env:
          NOTION_KEY: ${{ secrets.NOTION_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: python misc_utils/updt_to_yest.py

      - name: Keep repository active monthly
        if: github.event_name == 'schedule'
        run: |
          DAY_OF_MONTH="$(date -u +%d)"
          if [ "$DAY_OF_MONTH" != "01" ]; then
            echo "Not the first day of the month; skipping keepalive commit."
            exit 0
          fi

          mkdir -p .github/keepalive
          echo "last-keepalive-utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)" > .github/keepalive/daily_notion_update_heartbeat.txt

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .github/keepalive/daily_notion_update_heartbeat.txt
          git commit -m "chore: monthly workflow keepalive" || exit 0
          git push
